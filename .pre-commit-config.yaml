repos:
  # 1. 基礎檢查與防呆
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: ['--fix=lf']

  # # 2. Ruff 文法檢查與自動格式化 (同時支援 .py 與 .pyi)
  # - repo: https://github.com/astral-sh/ruff-pre-commit
  #   rev: v0.4.8
  #   hooks:
  #     - id: ruff
  #       args: [ --fix ]
  #     - id: ruff-format

  # 3. 自動插入 / 檢查 SPDX License
  - repo: https://github.com/lucas-c/pre-commit-hooks
    rev: v1.5.5
    hooks:
      # [A] 針對 Python 檔案 (.py 和 .pyi)
      - id: insert-license
        name: Insert SPDX License (Python)
        files: \.(py|pyi)$
        exclude: ^\.github/LICENSE_HEADER\.txt$
        args:
          - --license-filepath
          - .github/LICENSE_HEADER.txt
          - --comment-style
          - "|#|"              # 每一行前面加上 #
          - --use-current-year

# [B] 針對 Markdown 檔案 (.md)
      - id: insert-license
        name: Insert SPDX License (Markdown)
        files: \.md$
        args:
          - --license-filepath
          - .github/LICENSE_HEADER_MD.txt # 指向已經寫好 的新模板
          - --comment-style
          - "||"                          # 告訴 pre-commit 不要加任何註解符號，直接貼上
          - --use-current-year

# -------------------------------------------------------------------
  # 4. 本地自訂腳本：自動同步 version 到 README 徽章
  # -------------------------------------------------------------------
  - repo: local
    hooks:
      - id: sync-version-badge
        name: Sync Version Badge in README
        entry: python sync_version_badge.py
        language: python
        files: ^(version|README\.md)$  # 只有當 version 或 README 被修改時才觸發
        pass_filenames: false          # 不需要把改變的檔名傳給腳本，腳本會自己找
