name: Python Version Matrix Test

on:
  push:
    branches:
      - master
    paths:
      - "**.py"
      - ".ci/common/**"
      - ".ci/python-test/**"
      - ".github/workflows/python-version-test.yaml"

  pull_request:
    branches:
      - master
    paths:
      - "**.py"
      - ".ci/common/**"
      - ".ci/python-test/**"
      - ".github/workflows/python-version-test.yaml"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-version-test:
    name: Python ${{ matrix.python-version }}
    runs-on: windows-2025
    continue-on-error: ${{ matrix.experimental }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            experimental: false

          - python-version: "3.11"
            experimental: false

          - python-version: "3.12"
            experimental: false

          - python-version: "3.13"
            experimental: false

          - python-version: "3.14"
            experimental: false

          - python-version: "3.15"
            experimental: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: ${{ matrix.python-version }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          enable-cache: true
          cache-python: true

      - name: Run WEMI AIO test
        shell: pwsh
        run: |
          .\.ci\python-test\python-version-test.ps1 `
            -RepositoryRoot "${{ github.workspace }}" `
            -PythonVersion "${{ matrix.python-version }}"
