name: VS2022 MSVC AIO Smoke Test
run-name: VS2022 MSVC smoke for ${{ github.ref_name }}

on:
  push:
    branches:
      - master
    paths:
      - "SDKs/**"
      - "devices/**"
      - "tasks/**"
      - "utils/**"
      - "include/**"
      - ".ci/**"
      - ".github/workflows/windows-vs2022.yaml"
      - "wemi.py"
      - "version.json"

  pull_request:
    branches:
      - master
    paths:
      - "SDKs/**"
      - "devices/**"
      - "tasks/**"
      - "utils/**"
      - "include/**"
      - ".ci/**"
      - ".github/workflows/windows-vs2022.yaml"
      - "wemi.py"
      - "version.json"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-vs2022-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: pwsh

jobs:
  vs2022-msvc:
    name: VS2022 MSVC AIO on Windows
    runs-on: windows-2022
    timeout-minutes: 45

    env:
      PYTHONUTF8: "1"
      INSTALL_PREFIX: ${{ github.workspace }}\build\install

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show runner environment
        run: |
          .\.ci\common\show-runner.ps1

      - name: Install winget
        uses: Cyberboss/install-winget@v1

      - name: Install WEMI prerequisites
        run: |
          .\.ci\vs2022-msvc\setup-prerequisites.ps1

      - name: Verify prerequisites
        run: |
          .\.ci\vs2022-msvc\verify-prerequisites.ps1

      - name: Prepare uv virtual environment
        run: |
          .\.ci\common\prepare-uv-venv.ps1 `
            -RepositoryRoot "${{ github.workspace }}"

      - name: Run WEMI VS2022/MSVC AIO installation
        run: |
          .\.ci\vs2022-msvc\run-install.ps1 `
            -RepositoryRoot "${{ github.workspace }}" `
            -InstallPrefix "$env:INSTALL_PREFIX"

      - name: Test installed Modules
        run: |
          .\.ci\vs2022-msvc\test-modules.ps1 `
            -InstallPrefix "$env:INSTALL_PREFIX"

      - name: Test MSVC compile smoke
        run: |
          .\.ci\vs2022-msvc\test-msvc-compile.ps1 `
            -InstallPrefix "$env:INSTALL_PREFIX" `
            -VsModule "vs/2022/Enterprise" `
            -MsvcModule "msvc/v143_14.44.35207/x64" `
            -UcrtModule "ucrt/10.0.26100.0"

      - name: Upload build outputs when failing
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vs2022-msvc-aio-failure-artifacts
          path: |
            build/cache.json
            build/modulefiles
            build/install
          if-no-files-found: warn
