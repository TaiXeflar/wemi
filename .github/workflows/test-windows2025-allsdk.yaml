name: All SDK Configure Observation

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  configure:
    name: Configure all SDK scanners
    runs-on: windows-2025
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.14"
          github-token: ${{ github.token }}

      - name: Run all SDK configure
        shell: pwsh
        run: |
          .\.ci\windows-2025-obs.ps1 `
            -RepositoryRoot "${{ github.workspace }}" `
            -PythonVersion "3.14"
