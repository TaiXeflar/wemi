name: Modules AIO Install Test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  modules-aio:
    name: Modules-only AIO on Windows
    runs-on: windows-2025
    timeout-minutes: 30

    env:
      PYTHONUTF8: "1"
      INSTALL_PREFIX: ${{ github.workspace }}\build\install

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Show runner environment
        run: |
          Write-Host "Windows:"
          Get-ComputerInfo |
            Select-Object WindowsProductName, WindowsVersion, OsBuildNumber |
            Format-List

          Write-Host "PowerShell 7:"
          pwsh --version
          $PSVersionTable

          Write-Host "uv:"
          uv --version

      - name: Install WEMI prerequisites
        run: |
          .\.ci\setup-wemi-deps.ps1

      - name: Verify prerequisite commands
        run: |
          Get-Command pwsh.exe
          Get-Command tclsh.exe
          Get-Command es.exe

          Write-Host "PowerShell:"
          pwsh --version

          Write-Host "Tcl:"
          tclsh.exe <<< 'puts [info patchlevel]'

          Write-Host "Everything CLI:"
          es.exe -version

      - name: Prepare dependency directory
        run: |
          New-Item -ItemType Directory -Force .deps | Out-Null

      - name: Create uv virtual environment
        run: |
          uv venv .venv --python 3.13.2 --seed
          .\.venv\Scripts\python.exe --version

      - name: Run WEMI Modules-only AIO installation
        run: |
          .\.venv\Scripts\python.exe .\wemi.py configure `
            -DMODULES_ONLY `
            --prefix "$env:INSTALL_PREFIX" `
            --aio

      - name: Verify installed Modules files
        run: |
          $requiredFiles = @(
            "bin\module.cmd",
            "bin\ml.cmd",
            "bin\envml.cmd",
            "init\cmd.cmd",
            "init\pwsh.ps1",
            "libexec\modulecmd.tcl",
            "modulefiles\null",
            "test\TESTINSTALL.bat",
            "test\TESTINSTALL_PWSH.ps1"
          )

          foreach ($relativePath in $requiredFiles) {
            $path = Join-Path $env:INSTALL_PREFIX $relativePath

            if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
              throw "Missing installed file: $relativePath"
            }

            Write-Host "Found: $relativePath"
          }

      - name: Test installed Modules in CMD
        shell: cmd
        run: |
          set "PATH=%INSTALL_PREFIX%\bin;%PATH%"
          cd /d "%INSTALL_PREFIX%\test"
          call TESTINSTALL.bat "%INSTALL_PREFIX%"

      - name: Test installed Modules in PowerShell 7
        shell: pwsh
        run: |
          $env:Path = "$env:INSTALL_PREFIX\bin;$env:Path"

          Push-Location "$env:INSTALL_PREFIX\test"
          try {
            pwsh.exe `
              -NoLogo `
              -NoProfile `
              -NonInteractive `
              -ExecutionPolicy Bypass `
              -File .\TESTINSTALL_PWSH.ps1 `
              -installpath "$env:INSTALL_PREFIX"

            if ($LASTEXITCODE -ne 0) {
              throw "TESTINSTALL_PWSH.ps1 failed. Exit code: $LASTEXITCODE"
            }
          }
          finally {
            Pop-Location
          }

      - name: Upload build outputs when failing
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: modules-aio-failure-artifacts
          path: |
            build/cache.json
            build/modulefiles
            build/install
          if-no-files-found: warn
