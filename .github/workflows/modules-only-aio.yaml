name: Modules only AIO Install Test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  modules-aio:
    name: Modules-only AIO on Windows
    runs-on: windows-2025
    timeout-minutes: 30

    env:
      PYTHONUTF8: "1"
      INSTALL_PREFIX: ${{ github.workspace }}\build\install

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Show runner environment
        run: |
          Get-ComputerInfo |
            Select-Object WindowsProductName, WindowsVersion, OsBuildNumber |
            Format-List

          pwsh.exe --version
          uv --version

      - name: Install WEMI prerequisites
        run: |
          .\.ci\modules-only-aio\setup-prerequisites.ps1

      - name: Verify prerequisites
        run: |
          .\.ci\modules-only-aio\verify-prerequisites.ps1

      - name: Prepare workspace
        run: |
          .\.ci\modules-only-aio\prepare-workspace.ps1 `
            -RepositoryRoot "${{ github.workspace }}"

      - name: Run WEMI Modules-only AIO installation
        run: |
          .\.ci\modules-only-aio\run-install.ps1 `
            -RepositoryRoot "${{ github.workspace }}" `
            -InstallPrefix "$env:INSTALL_PREFIX"

      - name: Test installed Modules
        run: |
          .\.ci\modules-only-aio\test-install.ps1 `
            -InstallPrefix "$env:INSTALL_PREFIX"

      - name: Upload build outputs when failing
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: modules-aio-failure-artifacts
          path: |
            build/cache.json
            build/modulefiles
            build/install
          if-no-files-found: warn
